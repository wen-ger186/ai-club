<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>会员登录 | 青少年科技俱乐部</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* --- 延续高雅数学灰风格 --- */
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: #ffffff;
      /* 数学纹理 */
      background-image: url("data:image/svg+xml,%3Csvg width='200' height='200' viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%2399aab5' stroke-width='1.2' opacity='0.5'%3E%3Cpath d='M30 30l15 20m0-20l-15 20M80 80h20v20h-20z'/%3E%3Ctext x='20' y='160' font-family='serif' font-size='18' fill='%2399aab5' stroke='none'&%23x2211;%3C/text%3E%3Ctext x='160' y='40' font-family='serif' font-size='18' fill='%2399aab5' stroke='none'&%23x03C0;%3C/text%3E%3Ccircle cx='140' cy='140' r='4' fill='%2399aab5' stroke='none'/%3E%3Cpath d='M140 140 L160 120 L180 100' stroke-dasharray='4,4'/%3E%3Ctext x='120' y='180' font-family='monospace' font-size='12' fill='%2399aab5' stroke='none'0101%3C/text%3E%3C/g%3E%3C/svg%3E");
      background-size: 180px 180px;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      color: #1a202c;
    }

    .login-container {
      width: 100%;
      max-width: 360px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.9);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
      padding: 40px 30px;
      border-radius: 24px;
      text-align: center;
    }

    .logo { font-size: 3rem; margin-bottom: 10px; display: block; }
    .title { font-size: 1.5rem; font-weight: 700; color: #1a202c; margin-bottom: 5px; }
    .subtitle { color: #718096; font-size: 0.9rem; margin-bottom: 30px; }

    .input-group { margin-bottom: 20px; text-align: left; }
    .label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #4a5568; font-weight: 500; }
    
    .input {
      width: 100%; padding: 12px 15px; font-size: 1rem; border-radius: 10px;
      border: 1px solid #cbd5e0; outline: none; box-sizing: border-box;
      background: #fff; transition: 0.3s;
    }
    .input:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15); }

    .btn {
      width: 100%; padding: 12px; font-size: 1rem; margin-top: 10px;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      color: #fff; border: none; border-radius: 50px; cursor: pointer;
      font-weight: 600; letter-spacing: 1px;
      box-shadow: 0 4px 15px rgba(30, 60, 114, 0.3);
      transition: all 0.3s ease;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(30, 60, 114, 0.4); }
    .btn:disabled { background: #cbd5e0; cursor: wait; }

    .tips { margin-top: 20px; font-size: 0.8rem; color: #a0aec0; }
    .tips a { color: #2a5298; text-decoration: none; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <div class="login-container">
    <span class="logo">🚀</span>
    <div class="title">会员登录</div>
    <div class="subtitle">Member Login</div>

    <div class="input-group">
      <label class="label">手机号码</label>
      <input type="tel" id="phone" class="input" placeholder="请输入报名时的手机号" maxlength="11">
    </div>

    <div class="input-group">
      <label class="label">密码</label>
      <input type="password" id="password" class="input" placeholder="默认密码：手机号后 4 位" maxlength="4">
    </div>

    <button class="btn" onclick="handleLogin()">进入会员中心</button>

    <div class="tips">
      还没有账号？ <a href="index.html">立即报名</a>
    </div>
  </div>

  <script>
    // ⚠️ 关键修正：以下 3 行必须在最顶端！手机端才不会报错！
    const supabaseUrl = 'https://d51lj08g91htqli3vlug.baseapi.memfiredb.com';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImV4cCI6MzM0MjgyMTUwNSwiaWF0IjoxNzY2MDIxNTA1LCJpc3MiOiJzdXBhYmFzZSJ9.jdrCafh9UrWQQn-BreixHfHVVP7mPhAakf2E6yN2P6g';
    const db = window.supabase.createClient(supabaseUrl, supabaseKey);

    // --- 业务逻辑函数在下面 ---
    async function handleLogin() {
      const btn = document.querySelector('.btn');
      const phone = document.getElementById('phone').value.trim();
      const pwd = document.getElementById('password').value.trim();

      if (!phone || !pwd) return alert('请输入手机号和密码');
      if (pwd.length !== 4) return alert('密码是手机号的最后 4 位');

      btn.disabled = true;
      btn.innerText = '正在验证...';

      try {
        const { data, error } = await db
          .from('members')
          .select('*')
          .eq('phone', phone)
          .single();

        if (error || !data) {
          throw new Error('未找到该手机号的报名记录');
        }

        const correctPwd = data.phone.trim().slice(-4);

        if (pwd === correctPwd) {
          localStorage.setItem('club_member', JSON.stringify(data));
          alert('🎉 欢迎回来，' + data.name + '同学！');
          window.location.href = 'member_center.html'; 
        } else {
          alert('密码错误！\n请输入该手机号的最后 4 位数字。');
        }

      } catch (e) {
        alert('登录失败：' + e.message);
      } finally {
        btn.disabled = false;
        btn.innerText = '进入会员中心';
      }
    }
  </script>
</body>
</html>
