<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI CLUB 管理后台</title>
    <style>
        /* 保持之前的样式，增加一个删除按钮的样式 */
        body { font-family: 'Microsoft YaHei', sans-serif; background-color: #f1f5f9; padding: 40px; }
        .container { max-width: 1200px; margin: 0 auto; background-color: white; padding: 30px; border-radius: 15px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid #f1f5f9; padding-bottom: 20px; }
        h1 { color: #1e293b; margin: 0; }
        .controls { display: flex; gap: 15px; align-items: center; }
        select { padding: 10px; border: 2px solid #cbd5e0; border-radius: 8px; }
        .stats { background-color: #e0f2fe; color: #0369a1; padding: 10px 20px; border-radius: 8px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background-color: #f8fafc; color: #64748b; }
        .tag { padding: 4px 8px; border-radius: 4px; font-size: 0.8em; font-weight: bold; }
        .tag-songshan { background: #dbeafe; color: #1e40af; }
        .tag-nancheng { background: #dcfce7; color: #166534; }
        .tag-nanshan  { background: #fce7f3; color: #9d174d; }
        .avatar { width: 50px; height: 50px; object-fit: cover; border-radius: 50%; border: 2px solid #cbd5e0; }
        
        /* 🔴 删除按钮样式 */
        .del-btn {
            background-color: #ef4444; color: white; border: none; padding: 5px 10px;
            border-radius: 4px; cursor: pointer; font-size: 0.8em;
        }
        .del-btn:hover { background-color: #b91c1c; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div>
                <h1 id="welcomeTitle">🎓 学员管理</h1>
                <p id="userRoleTag" style="color: #64748b; margin-top: 5px;">...</p>
            </div>
            
            <div class="controls">
                <div id="stats" class="stats">加载中...</div>
                <select id="clubFilter" onchange="filterLocalData()">
                    <option value="all">🏢 显示全部</option>
                    <option value="莞-松湖俱乐部">📍 莞-松湖俱乐部</option>
                    <option value="莞-南城俱乐部">📍 莞-南城俱乐部</option>
                    <option value="深-南山俱乐部">📍 深-南山俱乐部</option>
                </select>
                <button onclick="logout()" style="padding:10px; background:#94a3b8; color:white; border:none; border-radius:8px; cursor:pointer;">退出</button>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>照片</th>
                    <th>姓名</th>
                    <th>所属俱乐部</th>
                    <th>就读学校 / 班级</th>
                    <th>家长联系</th>
                    <th>操作</th> </tr>
            </thead>
            <tbody id="studentTableBody"></tbody>
        </table>
    </div>

    <script>
        let allStudents = [];
        // 获取当前登录者的信息
        const myRole = localStorage.getItem('user_role');
        const myClub = localStorage.getItem('user_club');

        window.onload = async function() {
            // 1. 门卫检查
            if (!localStorage.getItem('user_token')) {
                alert('🚫 请先登录！');
                window.location.href = 'login.html';
                return;
            }

            // 2. 更新页面标题，显示当前身份
            document.getElementById('userRoleTag').innerText = `当前身份: ${formatRoleName(myRole)} | 所属: ${myClub === 'all' ? '总部' : myClub}`;

            // 3. 如果是俱乐部管理员，隐藏筛选框（因为他只能看自己的，没得选）
            if (myRole === 'club_admin') {
                document.getElementById('clubFilter').style.display = 'none';
            }

            // 4. 向后端请求数据（带上身份令牌）
            try {
                const response = await fetch('http://localhost:3000/api/check', {
                    method: 'POST', // 改用 POST 以便发送 JSON 数据
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ role: myRole, myClub: myClub })
                });
                const result = await response.json();
                
                allStudents = result.data;
                renderTable(allStudents);

            } catch (error) {
                console.error('加载失败:', error);
                document.getElementById('stats').innerText = '❌ 连接失败';
            }
        };

        // 本地显示筛选
        function filterLocalData() {
            const selectedClub = document.getElementById('clubFilter').value;
            let filtered;
            if (selectedClub === 'all') filtered = allStudents;
            else filtered = allStudents.filter(s => s.clubLocation === selectedClub);
            renderTable(filtered);
        }

        function renderTable(data) {
            const tbody = document.getElementById('studentTableBody');
            tbody.innerHTML = ''; 
            document.getElementById('stats').innerText = `📊 当前列表: ${data.length} 人`;

            data.forEach(student => {
                const tr = document.createElement('tr');
                const date = new Date(student.createdAt).toLocaleDateString();

                // 图片处理
                let photoHtml = '<span style="color:#cbd5e0;font-size:0.8em">无</span>';
                if (student.childPhoto) {
                    const filename = student.childPhoto.split(/[/\\]/).pop();
                    photoHtml = `<img src="uploads/${filename}" class="avatar">`;
                }

                // 标签颜色
                let tagClass = 'tag-songshan'; 
                if (student.clubLocation.includes('南城')) tagClass = 'tag-nancheng';
                if (student.clubLocation.includes('南山')) tagClass = 'tag-nanshan';

                // ★★★ 权限控制：只有终极管理员能看到删除按钮 ★★★
                let actionHtml = '<span style="color:#ccc;font-size:0.8em">无权限</span>';
                if (myRole === 'ultimate_admin') {
                    actionHtml = `<button class="del-btn" onclick="deleteUser('${student._id}')">删除</button>`;
                }

                tr.innerHTML = `
                    <td>${photoHtml}</td>
                    <td style="font-weight:bold; color:#334155">${student.childName} <br> <span style="font-size:0.8em;color:#94a3b8">${student.gender}</span></td>
                    <td><span class="tag ${tagClass}">${student.clubLocation}</span></td>
                    <td>${student.school} <br> <span style="font-size:0.8em;color:#64748b">${student.gradeClass}</span></td>
                    <td>📱 ${student.parentPhone} <br> 💬 ${student.parentWeChat}</td>
                    <td>${actionHtml}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 删除功能
        async function deleteUser(id) {
            if(!confirm('⚠️ 警告：确定要彻底删除该会员资料吗？此操作不可恢复！')) return;

            const response = await fetch('http://localhost:3000/api/delete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: id, role: myRole }) // 必须把身份发过去验证
            });
            const res = await response.json();
            if(res.success) {
                alert('删除成功');
                location.reload();
            } else {
                alert('删除失败: ' + res.message);
            }
        }

        function formatRoleName(role) {
            if(role === 'ultimate_admin') return '👑 终极管理员';
            if(role === 'super_admin') return '🌟 超级管理员';
            if(role === 'club_admin') return '🏢 俱乐部管理员';
            return '普通会员';
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
