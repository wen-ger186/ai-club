<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>会员中心</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: sans-serif; padding: 40px; text-align: center; background: #f0f2f5; }
    .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    h1 { color: #1e3c72; }
    p { color: #666; }
    .btn { padding: 10px 20px; background: #dc3545; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 20px;}
  </style>
</head>
<body>
  <div class="card">
    <h1>🏗️ 会员中心建设中...</h1>
    <p>欢迎你！<span id="memberName" style="font-weight:bold; color:#1e3c72"></span></p>
    <p>这里将展示你的积分、课表和成长档案。</p>
    
    <button class="btn" onclick="logout()">退出登录</button>
  </div>

  <script>
    // 检查是否登录
    const user = JSON.parse(localStorage.getItem('club_member'));
    if (!user) {
      alert('请先登录');
      window.location.href = 'member_login.html';
    } else {
      document.getElementById('memberName').innerText = user.name;
    }

    function logout() {
      localStorage.removeItem('club_member');
      window.location.href = 'member_login.html';
    }
  </script>
</body>
</html>
