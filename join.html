<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI CLUB 报名表</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 针对报名页的独立微调 */
        body {
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px 0;
        }
        .join-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
        }
        .form-header { text-align: center; margin-bottom: 30px; }
        .form-header h2 { color: #2563EB; margin-bottom: 10px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #374151; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box; /* 关键：防止输入框撑破容器 */
        }
        .btn-submit {
            width: 100%;
            padding: 15px;
            background-color: #2563EB;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-submit:hover { background-color: #1d4ed8; }
        .preview-img { width: 100px; height: 100px; object-fit: cover; border-radius: 50%; border: 2px solid #eee; display: none; margin-top: 10px; }
    </style>
</head>
<body>

<div class="join-container">
    <div class="form-header">
        <h2>🚀 加入我们</h2>
        <p>填写信息，开启 AI 之旅</p>
    </div>

    <form id="join-form" onsubmit="handleJoin(event)">
        <div class="form-group">
            <label>学员姓名 (中文) *</label>
            <input type="text" id="j-name" required placeholder="例如：张小明">
        </div>

        <div class="form-group">
            <label>性别</label>
            <select id="j-gender">
                <option value="男">男</option>
                <option value="女">女</option>
            </select>
        </div>

        <div class="form-group">
            <label>就读学校 *</label>
            <input type="text" id="j-school" required placeholder="例如：松山湖实验小学">
        </div>

        <div class="form-group">
            <label>就读班级 *</label>
            <input type="text" id="j-class" required placeholder="例如：三年2班">
        </div>

        <div class="form-group">
            <label>家长手机号 (将作为登录账号) *</label>
            <input type="tel" id="j-phone" required placeholder="请输入11位手机号" maxlength="11">
        </div>

        <div class="form-group">
            <label>家长微信号 *</label>
            <input type="text" id="j-wechat" required placeholder="用于接收上课通知">
        </div>

        <div class="form-group">
            <label>📸 上传照片 (可选)</label>
            <input type="file" id="j-photo" accept="image/*" onchange="previewFile()">
            <img id="img-preview" class="preview-img" alt="预览">
            <input type="hidden" id="base64-photo"> </div>

        <button type="submit" class="btn-submit">立即报名</button>
        <p style="text-align:center; margin-top:15px; font-size:14px;">
            已有账号？ <a href="login.html" style="color:#2563EB;">去登录</a>
        </p>
    </form>
</div>

<script>
    // 1. 图片转 Base64 (让图片能存进浏览器缓存)
    function previewFile() {
        const file = document.getElementById('j-photo').files[0];
        const preview = document.getElementById('img-preview');
        const hiddenInput = document.getElementById('base64-photo');

        if (file) {
            // 限制大小，防止浏览器缓存爆满 (限制 2MB)
            if (file.size > 2 * 1024 * 1024) {
                alert("照片太大啦！请上传 2MB 以内的照片。");
                document.getElementById('j-photo').value = ""; // 清空
                return;
            }

            const reader = new FileReader();
            reader.onloadend = function () {
                preview.src = reader.result;
                preview.style.display = "block";
                hiddenInput.value = reader.result; // 把图片代码存起来
            }
            reader.readAsDataURL(file);
        }
    }

    // 2. 核心提交逻辑 (对接到 LocalStorage)
    function handleJoin(e) {
        e.preventDefault(); // 阻止默认的"联网"提交

        // 获取表单数据
        const name = document.getElementById('j-name').value.trim();
        const gender = document.getElementById('j-gender').value;
        const school = document.getElementById('j-school').value.trim();
        const gradeClass = document.getElementById('j-class').value.trim();
        const phone = document.getElementById('j-phone').value.trim();
        const wechat = document.getElementById('j-wechat').value.trim();
        const photo = document.getElementById('base64-photo').value;

        if(!name || !phone || !school) {
            alert("请填写完整信息");
            return;
        }

        // === 读取 logic.js 使用的同一个数据库 ===
        // 注意：这里必须和 logic.js 里的 Key 保持一致 (db_users_v11)
        let userDB = JSON.parse(localStorage.getItem('db_users_v11')) || [];
        let profileDB = JSON.parse(localStorage.getItem('db_profiles_v11')) || [];

        // 检查手机号是否注册过
        const exist = userDB.find(u => u.username === phone);
        if (exist) {
            alert("该手机号已经注册过了！请直接登录。");
            window.location.href = "login.html";
            return;
        }

        // === 写入数据 ===
        
        // 1. 创建登录账号 (默认密码 手机后4位 或 123456)
        const newAccount = {
            username: phone,
            password: phone.slice(-4) || "123456", // 默认密码：手机号后4位
            role: 'member',
            displayName: name
        };

        // 2. 创建详细档案
        const newProfile = {
            phone: phone,
            name: name,
            role: 'member',
            gender: gender,
            club: '待分配', // 默认状态
            school: school,
            gradeClass: gradeClass,
            parentWeChat: wechat,
            photo: photo, // 存入图片
            idcard: ''    // 身份证先留空
        };

        // 3. 保存到本地存储
        userDB.push(newAccount);
        profileDB.push(newProfile);

        localStorage.setItem('db_users_v11', JSON.stringify(userDB));
        localStorage.setItem('db_profiles_v11', JSON.stringify(profileDB));

        // 4. 成功反馈
        alert(`🎉 报名成功！\n\n您的登录账号是：${phone}\n初始密码是：${phone.slice(-4)}\n\n点击确定跳转登录...`);
        window.location.href = "login.html";
    }
</script>

</body>
</html>
