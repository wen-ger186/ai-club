<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI CLUB 报名表</title>
    <style>
        /* 页面整体样式 */
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* 报名卡片样式 */
        .container {
            background-color: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }

        h1 {
            text-align: center;
            color: #1a202c;
            margin-bottom: 30px;
        }

        /* 表单控件样式 */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #4a5568;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            border-color: #3182ce;
            outline: none;
        }

        /* 提交按钮样式 */
        .submit-btn {
            width: 100%;
            padding: 15px;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .submit-btn:hover {
            background-color: #1d4ed8;
        }

        .submit-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        /* 必填项星号 */
        .required {
            color: #e53e3e;
            margin-left: 4px;
        }

        /* 分割线 */
        .section-title {
            color: #2d3748;
            border-left: 4px solid #2563eb;
            padding-left: 10px;
            margin-top: 30px;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🚀 AI CLUB 报名表</h1>
        
        <form id="joinForm">
            
            <div class="form-group">
                <label>选择所属俱乐部 <span class="required">*</span></label>
                <select name="clubLocation" required>
                    <option value="">-- 请选择 --</option>
                    <option value="莞-松湖俱乐部">莞-松湖俱乐部</option>
                    <option value="莞-南城俱乐部">莞-南城俱乐部</option>
                    <option value="深-南山俱乐部">深-南山俱乐部</option>
                </select>
            </div>

            <h3 class="section-title">👶 孩子信息</h3>

            <div class="form-group">
                <label>孩子姓名 <span class="required">*</span></label>
                <input type="text" name="childName" placeholder="请输入孩子真实姓名" required>
            </div>

            <div class="form-group">
                <label>孩子身份证号码 <span class="required">*</span></label>
                <input type="text" name="childIDCard" placeholder="用于购买保险 (系统已加密)" required>
            </div>

            <div class="form-group">
                <label>性别 <span class="required">*</span></label>
                <select name="gender" required>
                    <option value="">-- 请选择 --</option>
                    <option value="男">男</option>
                    <option value="女">女</option>
                </select>
            </div>

            <div class="form-group">
                <label>就读学校 (日常上课学校) <span class="required">*</span></label>
                <input type="text" name="school" placeholder="例如：松山湖中心小学" required>
            </div>

            <div class="form-group">
                <label>就读班级 <span class="required">*</span></label>
                <input type="text" name="gradeClass" placeholder="例如：三年级2班" required>
            </div>

            <h3 class="section-title">📷 照片上传 (新功能)</h3>
            
            <div class="form-group">
                <div style="border: 2px dashed #cbd5e0; padding: 20px; text-align: center; border-radius: 8px; background-color: #f8fafc;">
                    <label style="margin-bottom: 15px;">请上传孩子生活照或证件照</label>
                    <input type="file" id="childPhoto" name="childPhoto" accept="image/*" style="display: block; margin: 0 auto; width: auto; border: none;">
                    <p style="font-size: 0.8rem; color: #718096; margin-top: 10px;">支持 jpg, png 格式</p>
                </div>
            </div>

            <h3 class="section-title">👨‍👩‍👧 家长联系方式</h3>

            <div class="form-group">
                <label>家长手机号 <span class="required">*</span></label>
                <input type="tel" name="parentPhone" placeholder="请输入手机号码" required>
            </div>

            <div class="form-group">
                <label>家长微信号 <span class="required">*</span></label>
                <input type="text" name="parentWeChat" placeholder="方便拉群通知" required>
            </div>

            <button type="submit" class="submit-btn">✅ 确认提交报名信息</button>
        </form>
    </div>

    <script src="script.js"></script>

</body>
</html>
